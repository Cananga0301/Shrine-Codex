services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legal_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legal_bot_pass}
      POSTGRES_DB: ${POSTGRES_DB:-legal_chatbot}
    ports:
      - "${POSTGRES_PORT_HOST:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legal_bot} -d ${POSTGRES_DB:-legal_chatbot}"]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.12.6
    ports:
      - "${QDRANT_PORT_HOST:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT_HOST:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  embedding:
    build:
      context: .
      dockerfile: services/embedding/Dockerfile
    env_file: .env
    volumes:
      - hf_cache:/root/.cache/huggingface
    ports:
      - "${EMBEDDING_PORT_HOST:-8001}:8001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 60

  reranker:
    build:
      context: .
      dockerfile: services/reranker/Dockerfile
    env_file: .env
    volumes:
      - hf_cache:/root/.cache/huggingface
    ports:
      - "${RERANKER_PORT_HOST:-8002}:8002"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 60

  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    env_file: .env
    volumes:
      - upload_storage:/app/services/ingestion/app/storage
    ports:
      - "${INGESTION_PORT_HOST:-8003}:8003"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      embedding:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 30

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file: .env
    ports:
      - "${API_PORT_HOST:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedding:
        condition: service_healthy
      reranker:
        condition: service_healthy
      ingestion:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 30

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT_HOST:-8080}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  qdrant_data:
  redis_data:
  hf_cache:
  upload_storage:
